<!doctype html>
<html lang="en">
<head>
    <title>Websocket Chat</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- CSS -->
    <link rel="stylesheet" href="/webjars/bootstrap/4.3.1/dist/css/bootstrap.min.css">
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body>
<div class="container" id="app" v-cloak>
    <div class="row">
        <div class="col-md-6">
            <h3>채팅방 개설</h3>
        </div>
        <div class="col-md-6 text-right">
            <span class="mr-2">현재 사용자: {{ userNickname }}</span> <!-- 현재 로그인한 사용자 닉네임 표시 -->
            <button class="btn btn-danger btn-sm" @click="logout">로그아웃</button> <!-- 로그아웃 버튼 -->
        </div>
    </div>

    <h4>대화할 사용자 이름 입력</h4>
    <input type="text" class="form-control mb-3" v-model="selectedUser" placeholder="대화할 사용자의 이름을 입력하세요" />

    <h4>모든 사용자 목록</h4>
    <ul class="list-group mb-3">
        <li class="list-group-item" v-for="user in users" v-bind:key="user">
            {{ user }}
        </li>
    </ul>

    <button class="btn btn-primary" @click="createRoom" :disabled="!selectedUser">채팅방 개설</button>

    <h4>현재 채팅방 목록</h4>
    <ul class="list-group">
        <li class="list-group-item list-group-item-action"
            v-for="item in chatrooms"
            v-bind:key="item.roomId"
            @click="enterRoom(item.roomId)">
            <h6>{{ item.name }} <span class="badge badge-info badge-pill">{{ item.userCount }}</span></h6>
            <!-- 채팅방 비우기 버튼 추가 -->
            <button class="btn btn-warning btn-sm" @click.stop="clearChat(item.roomId)">채팅방 나가기</button>
        </li>
    </ul>
</div>

<!-- JavaScript -->
<script src="/webjars/vue/2.5.16/dist/vue.min.js"></script>
<script src="/webjars/axios/0.17.1/dist/axios.min.js"></script>
<script>
    var vm = new Vue({
        el: '#app',
        data: {
            users: [], // 사용자 목록
            selectedUser: '', // 사용자가 입력한 대화 상대의 이름
            chatrooms: [],
            userNickname: '' // 현재 로그인한 사용자의 닉네임
        },
        created() {
            this.fetchAllUserNames(); // 모든 사용자 이름을 가져옵니다.
            this.findUserRooms(); // 로그인한 사용자가 참여 가능한 방 목록 조회
            this.getUserInfo(); // 현재 로그인한 사용자 정보 조회
        },
        methods: {
            fetchAllUserNames: function() {
                axios.get('/api/users/names') // 모든 사용자 이름 요청
                    .then(response => {
                        this.users = response.data; // 사용자 이름 저장
                    })
                    .catch(error => {
                        console.error("사용자 이름 조회 실패:", error);
                    });
            },
            getUserInfo: function() {
                axios.get('/api/chat/user') // 현재 로그인한 사용자 정보 요청
                    .then(response => {
                        this.userNickname = response.data.data.name; // 사용자의 닉네임 저장
                    })
                    .catch(error => {
                        console.error("사용자 정보 조회 실패:", error);
                    });
            },
            findUserRooms: function() {
                axios.get('/api/chat/rooms').then(response => {
                    if (Array.isArray(response.data)) {
                        this.chatrooms = response.data; // 참여 가능한 방만 리스트에 업데이트
                    }
                }).catch(error => {
                    console.error("참여 가능한 채팅방 조회 실패:", error);
                });
            },
            createRoom: function() {
                if (!this.selectedUser) {
                    alert("대화할 사용자의 이름을 입력해 주세요.");
                    return;
                } else {
                    var params = new URLSearchParams();
                    params.append("receiver", this.selectedUser); // 입력한 사용자로 수신자 설정
                    axios.post('/api/chat/room', params)
                        .then(response => {
                            alert(response.data.name + " 방 개설에 성공하였습니다.");
                            this.selectedUser = ''; // 입력 필드 초기화
                            this.findUserRooms(); // 방 목록 새로 고침
                        })
                        .catch(error => {
                            alert("채팅방 개설에 실패하였습니다.");
                        });
                }
            },
            enterRoom: function(roomId) {
                localStorage.setItem('wschat.roomId', roomId); // 방 ID 저장
                location.href = "/api/chat/room/" + roomId + "/show"; // 채팅방 상세 페이지로 이동
            },
            clearChat: function(roomId) {
                if (confirm("채팅방을 나가겠습니까?")) {
                    axios.delete('/api/chat/message', { params: { roomId: roomId } }) // 메시지 삭제 API 호출
                        .then(response => {
                            alert("성공"); // 성공 메시지 표시
                            location.href = "/api/chat/room";
                            this.findUserRooms(); // 방 목록 새로 고침
                        })
                        .catch(error => {
                            console.error("실패:", error);
                            alert("채팅방 나가기에 실패하였습니다.");
                        });
                }
            },
            logout: function() {
                axios.post('/api/users/logout') // 로그아웃 API 호출
                    .then(response => {
                        alert(response.msg); // 성공 메시지 표시
                        location.href = "/api/users/login"; // 로그인 페이지로 리다이렉트
                    })
                    .catch(error => {
                        console.error("로그아웃 실패:", error);
                        alert("로그아웃에 실패하였습니다.");
                    });
            }
        }
    });
</script>
</body>
</html>
